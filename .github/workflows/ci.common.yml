name: Common CI
on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      node_version:
        required: true
        type: string
      queue_backend:
        required: false
        type: string
        default: 'fauxqs'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup Node ${{ inputs.node_version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          cache: 'pnpm'

      - name: Install
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build TS
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: pnpm run build --filter="$PACKAGE_NAME"

      - name: Run lint
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: pnpm run lint --filter="$PACKAGE_NAME"

      - name: Docker start
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          QUEUE_BACKEND: ${{ inputs.queue_backend }}
        run: pnpm run docker:start:ci --filter="$PACKAGE_NAME"

      - name: Run Tests
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          QUEUE_BACKEND: ${{ inputs.queue_backend }}
        run: |
          echo "::notice::Running $PACKAGE_NAME with QUEUE_BACKEND=$QUEUE_BACKEND"
          pnpm run test:ci --filter="$PACKAGE_NAME"

      - name: Docker stop
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          QUEUE_BACKEND: ${{ inputs.queue_backend }}
        run: pnpm run docker:stop:ci --filter="$PACKAGE_NAME"
