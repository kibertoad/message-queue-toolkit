name: Common CI
on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
      node_version:
        required: true
        type: string
      queue_backend:
        required: false
        type: string
        default: 'fauxqs'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node ${{ inputs.node_version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node_version }}
          package-manager-cache: false

      - name: Install
        run: npm install --ignore-scripts

      - name: Build TS
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: npm run build -- --filter="$PACKAGE_NAME"

      - name: Run lint
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
        run: npm run lint -- --filter="$PACKAGE_NAME"

      - name: Docker start
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          QUEUE_BACKEND: ${{ inputs.queue_backend }}
        run: npm run docker:start:ci -- --filter="$PACKAGE_NAME"

      - name: Run Tests
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          QUEUE_BACKEND: ${{ inputs.queue_backend }}
        run: |
          echo "::notice::Running $PACKAGE_NAME with QUEUE_BACKEND=$QUEUE_BACKEND"
          npm run test:ci -- --filter="$PACKAGE_NAME"

      - name: Docker stop
        env:
          PACKAGE_NAME: ${{ inputs.package_name }}
          QUEUE_BACKEND: ${{ inputs.queue_backend }}
        run: npm run docker:stop:ci -- --filter="$PACKAGE_NAME"
